<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- SVG Icons (hidden) -->
  <svg style="display:none">
    <defs>
      <!-- Home -->

        <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>

      <!-- Food/plate -->
      <symbol id="icon-food" viewBox="0 0 24 24">
        <path fill="currentColor" d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05l1.66 1.66c.64.64 1.59.72 2.34.2l1.14-.8c.53-.38.68-1.05.35-1.59l-.9-1.55c-.33-.54-.98-.8-1.58-.63l-1.78.5c-.88.25-1.54.96-1.71 1.84l-.45 2.34L18.06 22.99zM1 21.99h15.03l.42-4.06L8.1 17.4l-.45-2.34L3.52 5.5 2.17 7.14 8.8 19.83l-.53 2.15z"/>

      <!-- Restaurant/meal -->

      </symbol>
      <!-- Star/favorite -->

      </symbol>
      <!-- Heart -->
      <symbol id="icon-heart" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </symbol>
      <symbol id="icon-heart-outline" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="none" stroke="currentColor" stroke-width="2"/>

      <!-- Location -->
      <symbol id="icon-location" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </symbol>
      <!-- Clock -->
      <symbol id="icon-clock" viewBox="0 0 24 24">
        <path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
      </symbol>
      <!-- Calendar -->
      <symbol id="icon-calendar" viewBox="0 0 24 24">
        <path fill="currentColor" d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>
      </symbol>
      <!-- Chat -->
      <symbol id="icon-chat" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
      </symbol>
      <!-- User/Profile -->
      <symbol id="icon-user" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </symbol>
      <!-- Search -->
      <symbol id="icon-search" viewBox="0 0 24 24">
        <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </symbol>
      <!-- Arrow right -->
      <symbol id="icon-arrow" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
      </symbol>
      <!-- Arrow back -->
      <symbol id="icon-arrow-left" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </symbol>
      <!-- Sun -->
      <symbol id="icon-sun" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
      </symbol>
      <!-- Moon -->
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.44-.44-.07-.9-.1-1.36-.1z"/>
      </symbol>
      <!-- Dollar -->
      <symbol id="icon-dollar" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" transform="rotate(0 12 12)"/>
        <path fill="currentColor" d="M11.8 9H13v-.8c0-.66-.54-1.2-1.2-1.2s-1.2.54-1.2 1.2v.8c-.93 0-1.6.67-1.6 1.6s.67 1.6 1.6 1.6h2.4c.53 0 .8.27.8.8s-.27.8-.8.8H11v.8c0 .66.54 1.2 1.2 1.2s1.2-.54 1.2-1.2v-.8c.93 0 1.6-.67 1.6-1.6s-.67-1.6-1.6-1.6h-2.4c-.53 0-.8-.27-.8-.8s.27-.8.8-.8z"/>
      </symbol>
      <!-- Phone -->
      <symbol id="icon-phone" viewBox="0 0 24 24">
        <path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
      </symbol>
      <!-- Check -->
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </symbol>
      <!-- Close/X -->
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </symbol>
      <!-- Special badge -->
      <symbol id="icon-special" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </symbol>
      <!-- Filter -->
      <symbol id="icon-filter" viewBox="0 0 24 24">
        <path fill="currentColor" d="M14 12v7.88c.04.3-.06.62-.29.83a.996.996 0 0 1-1.41 0l-2.01-2.01a.989.989 0 0 1-.29-.83V12h-.03L4.21 4.62a1 1 0 0 1 .17-1.4c.19-.14.4-.22.62-.22h14c.22 0 .43.08.62.22a1 1 0 0 1 .17 1.4L14.03 12H14z"/>
      </symbol>
    </defs>
  </svg>

  <!-- Landing Page -->
  <div id="landing" class="page">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg class="icon"><use href="#icon-sun"/></svg>
    </button>
    
    <div class="hero">
      <div class="logo">
        <svg class="icon-lg"><use href="#icon-food"/></svg>
      </div>
      <h1>Foodie</h1>
      <p class="tagline">Discover & Book Great Places</p>
      <p class="desc">Find the best restaurants and cafes near you. Reserve a table, save favorites, and chat directly with venues.</p>
      
      <div class="features">
        <div class="feature">
          <svg class="icon"><use href="#icon-search"/></svg>
          <span>Discover</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-heart"/></svg>
          <span>Save</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-calendar"/></svg>
          <span>Book</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-chat"/></svg>
          <span>Chat</span>
        </div>
      </div>
      
      <button class="btn-primary" onclick="openApp()">
        Open Demo
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>
      
      <p class="note">This is a demo template &bull; Works offline</p>
    </div>
  </div>

  <!-- Mobile App -->
  <div id="app" class="page hidden">
    <div class="phone-frame">
      <div class="phone-header">
        <span class="status-bar"></span>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>
      
      <div class="app-header">
        <button class="back-btn hidden" onclick="goBack()" id="backBtn">
          <svg class="icon"><use href="#icon-arrow-left"/></svg>
        </button>
        <h2 id="appTitle">Home</h2>
        <div class="header-actions">
          <button class="icon-btn" onclick="showPage('search')" title="Search">
            <svg class="icon"><use href="#icon-search"/></svg>
          </button>
          <div class="profile-icon" onclick="showPage('profile')">
            <svg class="icon"><use href="#icon-user"/></svg>
          </div>
        </div>
      </div>
      
      <div class="app-content" id="content">
        <!-- Content injected by JS -->
      </div>
      
      <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="showPage('home', this)">
          <svg class="icon-nav"><use href="#icon-home"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" onclick="showPage('explore', this)">
          <svg class="icon-nav"><use href="#icon-search"/></svg>
          <span>Explore</span>
        </button>
        <button class="nav-item" onclick="showPage('favorites', this)">
          <svg class="icon-nav"><use href="#icon-heart"/></svg>
          <span>Favorites</span>
        </button>
        <button class="nav-item" onclick="showPage('bookings', this)">
          <svg class="icon-nav"><use href="#icon-calendar"/></svg>
          <span>Bookings</span>
          <span class="chat-badge">2</span>
        </button>
        <button class="nav-item" onclick="showPage('chat', this)">
          <svg class="icon-nav"><use href="#icon-chat"/></svg>
          <span>Chat</span>
          <span class="chat-badge">3</span>
        </button>
      </div>
    </div>
    
    <button class="btn-exit" onclick="closeApp()">Back to Home</button>
  </div>

  <script src="js/locales.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
