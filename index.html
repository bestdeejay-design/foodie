<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Foodie — Restaurant Finder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23ef4444' d='M8.1 13.34l2.83-2.83L3.91 3.5c-1.56 1.56-1.56 4.09 0 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z'/></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css">
  <style>
    /* Web Demo Styles */
    .web-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-dark); border-bottom: 1px solid var(--border);
      padding: 14px 32px; display: flex; align-items: center; gap: 24px;
      backdrop-filter: blur(12px);
    }
    .web-logo { font-size: 26px; font-weight:800; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .web-logo svg { width: 30px; height: 30px; }
    .web-search { flex:1; max-width:520px; display:flex; align-items:center; gap:10px; background:var(--bg-input); border:1.5px solid var(--border); border-radius:14px; padding:11px 18px; transition:border-color 0.2s; }
    .web-search:focus-within { border-color: var(--primary); }
    .web-search svg { width:20px;height:20px;color:var(--text-muted);flex-shrink:0; }
    .web-search input { background:none;border:none;color:var(--text);font-size:15px;outline:none;width:100%; }
    .web-search input::placeholder { color:var(--text-muted); }
    .web-header-actions { display:flex;align-items:center;gap:12px; }
    .web-icon-btn { width:40px;height:40px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s; }
    .web-icon-btn:hover { border-color:var(--primary);color:var(--primary);background:var(--bg-card-hover); }
    .web-icon-btn svg { width:20px;height:20px; }
    .web-lang-btn { padding:8px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s; }
    .web-lang-btn:hover { border-color:var(--primary);color:var(--primary); }
    .web-exit-btn { display:flex;align-items:center;gap:6px;padding:6px 16px;background:none;border:1.5px solid var(--border);border-radius:10px;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s; }
    .web-exit-btn:hover { border-color:var(--primary);color:var(--primary); }

    .web-cart-btn { position:relative;width:40px;height:40px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s; }
    .web-cart-btn:hover { border-color:var(--primary);color:var(--primary); }
    .web-cart-btn svg { width:20px;height:20px; }
    .web-cart-badge { position:absolute;top:-6px;right:-6px;background:var(--primary);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px; }
    .web-cart-badge:empty { display:none; }

    .web-cuisine-section { margin-bottom:40px; }
    .web-cuisine-scroll {
      display:flex; gap:20px; overflow-x:auto; padding:8px 4px 12px;
      scrollbar-width:none; -ms-overflow-style:none;
    }
    .web-cuisine-scroll::-webkit-scrollbar { display:none; }
    .web-cuisine-item {
      flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:10px;
      cursor:pointer; min-width:88px; transition:transform 0.2s;
    }
    .web-cuisine-item:hover { transform:translateY(-3px); }
    .web-cuisine-circle {
      width:80px; height:80px; border-radius:50%; background:var(--bg-card);
      border:2px solid var(--border); display:flex; align-items:center; justify-content:center;
      font-size:36px; transition:all 0.25s; position:relative;
    }
    .web-cuisine-item:hover .web-cuisine-circle { border-color:var(--primary); box-shadow:0 4px 20px var(--shadow); }
    .web-cuisine-item.active .web-cuisine-circle {
      border-color:var(--primary); background:var(--primary);
      box-shadow:0 4px 20px var(--glow);
    }
    .web-cuisine-item.active .web-cuisine-circle .emoji { filter:grayscale(0); }
    .web-cuisine-label { font-size:13px; font-weight:600; text-align:center; line-height:1.2; }
    .web-cuisine-count { font-size:11px; color:var(--text-muted); }

    .web-content { padding:32px;max-width:1440px;margin:0 auto; }
    .web-section-title { font-size:22px;font-weight:700;margin-bottom:20px; }
    .web-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:24px; }

    .web-card { background:var(--bg-card);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.3s; }
    .web-card:hover { transform:translateY(-6px);box-shadow:0 12px 40px var(--shadow);border-color:var(--primary); }
    .web-card-img { height:200px;background-size:cover;background-position:center;position:relative; }
    .web-card-fav { position:absolute;top:14px;right:14px;width:40px;height:40px;border-radius:12px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1;transition:all 0.2s; }
    .web-card-fav:hover { background:rgba(0,0,0,0.7); }
    .web-card-body { padding:20px; }
    .web-card-title { font-size:18px;font-weight:700;margin-bottom:8px; }
    .web-card-meta { display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:10px;flex-wrap:wrap; }
    .web-card-meta .rating { display:flex;align-items:center;gap:5px;color:var(--accent);font-weight:700;font-size:15px; }
    .web-card-meta .price { font-weight:700;color:var(--text-muted); }
    .web-card-desc { font-size:14px;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .web-card-tags { display:flex;gap:6px;flex-wrap:wrap;margin-top:14px; }
    .web-card-tag { font-size:12px;padding:4px 12px;background:var(--bg-light);border-radius:10px;color:var(--text-muted); }

    .web-center-col { max-width:900px;margin:0 auto; }
    .web-back-btn { display:inline-flex;align-items:center;gap:8px;color:var(--text-muted);cursor:pointer;font-size:14px;font-weight:600;margin-bottom:20px;background:none;border:none;padding:8px 16px;border-radius:10px;transition:all 0.2s; }
    .web-back-btn:hover { color:var(--primary);background:var(--bg-card); }
    .web-detail-hero { height:380px;background-size:cover;background-position:center;border-radius:24px;position:relative;margin-bottom:32px;display:flex;align-items:flex-end;padding:32px; }
    .web-detail-hero::after { content:'';position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(transparent,rgba(0,0,0,0.75));border-radius:0 0 24px 24px;z-index:1; }
    .web-detail-hero-info { position:relative;z-index:2;color:#fff; }
    .web-detail-hero-info h1 { font-size:40px;margin-bottom:10px;line-height:1.1; }
    .web-detail-hero-info .meta { display:flex;align-items:center;gap:14px;font-size:16px;opacity:0.9; }
    .web-detail-grid { display:grid;grid-template-columns:1fr 340px;gap:40px;align-items:start; }
    .web-detail-main h3 { font-size:20px;margin-bottom:14px; }
    .web-detail-desc { font-size:16px;line-height:1.75;color:var(--text-muted);margin-bottom:32px; }
    .web-menu-item { display:flex;justify-content:space-between;align-items:flex-start;padding:16px 0;border-bottom:1px solid var(--border);gap:16px; }
    .web-menu-item:last-child { border-bottom:none; }
    .web-menu-item h4 { margin:0 0 4px;font-size:16px;font-weight:600; }
    .web-menu-item p { margin:0;font-size:13px;color:var(--text-muted); }
    .web-menu-item .price { font-weight:700;color:var(--success);font-size:17px;white-space:nowrap; }

    .web-menu-tabs { position:sticky;top:76px;z-index:50;background:var(--bg-dark);border-bottom:1px solid var(--border);padding:10px 0;margin:0 0 24px;display:flex;gap:4px;overflow-x:auto; }
    .web-menu-tab { flex-shrink:0;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;background:transparent;color:var(--text-muted);border:none;cursor:pointer;transition:all 0.2s;white-space:nowrap; }
    .web-menu-tab:hover { background:var(--bg-card);color:var(--text); }
    .web-menu-tab.active { background:var(--primary);color:#fff; }
    .web-menu-section { padding-top:8px; }
    .web-menu-section h4 { font-size:16px;color:var(--primary);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--primary);display:inline-block; }

    .web-sidebar { position:sticky;top:156px; }
    .web-info-card { background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px; }
    .web-info-row { display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;gap:12px; }
    .web-info-row:last-child { border-bottom:none; }
    .web-info-label { display:flex;align-items:center;gap:8px;color:var(--text-muted);flex-shrink:0; }
    .web-info-value { font-weight:500;text-align:right; }
    .web-book-btn { width:100%;padding:18px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px var(--glow);transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:10px; }
    .web-book-btn:hover { transform:translateY(-2px);box-shadow:0 8px 28px var(--glow); }
    .web-empty { text-align:center;padding:80px 20px; }
    .web-form-group { margin-bottom:16px; }
    .web-form-group label { display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:600; }
    .web-form-group input,.web-form-group select { width:100%;padding:14px 16px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;transition:border-color 0.2s; }
    .web-form-group input:focus,.web-form-group select:focus { border-color:var(--primary); }
    .web-success { text-align:center;padding:80px 20px; }

    @media (max-width:900px) {
      .web-header { padding:10px 16px;gap:12px; }
      .web-search { max-width:none; }
      .web-content { padding:16px; }
      .web-detail-grid { grid-template-columns:1fr; }
      .web-detail-hero { height:240px;padding:20px; }
      .web-detail-hero-info h1 { font-size:28px; }
      .web-grid { grid-template-columns:1fr; }
      .web-sidebar { position:static; }
    }
  </style>
</head>

        <path fill="currentColor" d="M14 12v7.88c.04.3-.06.62-.29.83a.996.996 0 0 1-1.41 0l-2.01-2.01a.989.989 0 0 1-.29-.83V12h-.03L4.21 4.62a1 1 0 0 1 .17-1.4c.19-.14.4-.22.62-.22h14c.22 0 .43.08.62.22a1 1 0 0 1 .17 1.4L14.03 12H14z"/>

      <symbol id="icon-globe" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></symbol>
    </defs>
  </svg>

  <!-- Landing Page -->
  <div id="landing" class="page">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg class="icon"><use href="#icon-sun"/></svg>
    </button>
    
    <div class="hero">
      <div class="logo">
        <svg class="icon-lg"><use href="#icon-food"/></svg>
      </div>
      <h1>Foodie</h1>
      <p class="tagline">Discover & Book Great Places</p>
      <p class="desc">Find the best restaurants and cafes near you. Reserve a table, save favorites, and chat directly with venues.</p>
      
      <div class="features">
        <div class="feature">
          <svg class="icon"><use href="#icon-search"/></svg>
          <span>Discover</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-heart"/></svg>
          <span>Save</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-calendar"/></svg>
          <span>Book</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-chat"/></svg>
          <span>Chat</span>
        </div>
      </div>
      
      <button class="btn-primary" onclick="openApp()">
        Mobile Demo
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>

      <button class="btn-primary" onclick="openWebApp()" style="background:transparent;border:2px solid var(--border);box-shadow:none;margin-top:12px;color:var(--text)">
        Web Demo
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>
      
      <p class="note">This is a demo template &bull; Works offline</p>
    </div>
  </div>

  <!-- Mobile App -->
  <div id="app" class="page hidden">
    <div class="phone-frame">
      <div class="phone-header">
        <span class="status-bar"></span>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>
      
      <div class="app-header">
        <button class="back-btn hidden" onclick="goBack()" id="backBtn">
          <svg class="icon"><use href="#icon-arrow-left"/></svg>
        </button>
        <h2 id="appTitle">Home</h2>
        <div class="header-actions">
          <button class="icon-btn" onclick="showPage('search')" title="Search">
            <svg class="icon"><use href="#icon-search"/></svg>
          </button>
          <button class="icon-btn" onclick="showPage('cart')" title="Cart" style="position:relative">
            <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.17 14.75l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.56-6.46c.09-.16.14-.35.14-.54 0-.55-.45-1-1-1H5.21l-.47-1.04c-.16-.37-.52-.6-.92-.6H2c-.55 0-1 .45-1 1s.45 1 1 1h1.26l3.39 7.16L5.3 14.7c-.18.35-.3.74-.3 1.15 0 1.1.9 2 2 2h12c.55 0 1-.45 1-1s-.45-1-1-1H7.42c-.14 0-.25-.11-.25-.25z"/></svg>
            <span id="cartBadge" style="position:absolute;top:-2px;right:-2px;background:var(--primary);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center">0</span>
          </button>
          <button class="icon-btn" onclick="showPage('chat')" title="Messages" style="position:relative">
            <svg class="icon"><use href="#icon-chat"/></svg>
            <span id="headerChatBadge" style="position:absolute;top:-2px;right:-2px;background:var(--primary);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center"></span>
          </button>
          <div class="profile-icon" onclick="showPage('profile')">
            <svg class="icon"><use href="#icon-user"/></svg>
          </div>
        </div>
      </div>
      
      <div class="app-content" id="content">
        <!-- Content injected by JS -->
      </div>
      
      <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="showPage('home', this)">
          <svg class="icon-nav"><use href="#icon-home"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" onclick="showPage('explore', this)">
          <svg class="icon-nav"><use href="#icon-search"/></svg>
          <span>Explore</span>
        </button>
        <button class="nav-item" onclick="showPage('favorites', this)">
          <svg class="icon-nav"><use href="#icon-heart"/></svg>
          <span>Favorites</span>
        </button>
        <button class="nav-item" onclick="showPage('bookings', this)">
          <svg class="icon-nav"><use href="#icon-calendar"/></svg>
          <span>Bookings</span>
          <span class="chat-badge">2</span>
        </button>
        <button class="nav-item" onclick="showPage('orders', this)">
          <svg class="icon-nav" viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 9h5v2H6V9zm0 4h8v2H6v-2zm10 0h2v2h-2v-2zm-4-4h4v2h-4V9z"/></svg>
          <span>Orders</span>
        </button>
      </div>
    </div>
    
    <button class="btn-exit" onclick="closeApp()">Back to Home</button>
  </div>

  <!-- Web App -->
  <div id="webApp" class="page hidden">
    <header class="web-header">
      <div class="web-logo" onclick="navigateTo('/')">
        <svg><use href="#icon-home"/></svg> Foodie
      </div>
      <div class="web-search">
        <svg><use href="#icon-search"/></svg>
        <input type="text" id="webSearchInput" placeholder="Search restaurants, cuisines...">
      </div>
      <div class="web-header-actions">
        <button class="web-lang-btn" onclick="switchLangWeb(window.CURRENT_LANG==='en'?'ru':'en')">
          <svg style="width:16px;height:16px;vertical-align:middle;margin-right:4px"><use href="#icon-globe"/></svg>
          <span id="webLangLabel">EN</span>
        </button>
        <button class="web-icon-btn" onclick="toggleTheme()" title="Toggle theme" id="webThemeBtn">
          <svg id="webThemeIcon"><use href="#icon-sun"/></svg>
        </button>
        <button class="web-cart-btn" onclick="showCart()" title="Cart">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.17 14.75l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.56-6.46c.09-.16.14-.35.14-.54 0-.55-.45-1-1-1H5.21l-.47-1.04c-.16-.37-.52-.6-.92-.6H2c-.55 0-1 .45-1 1s.45 1 1 1h1.26l3.39 7.16L5.3 14.7c-.18.35-.3.74-.3 1.15 0 1.1.9 2 2 2h12c.55 0 1-.45 1-1s-.45-1-1-1H7.42c-.14 0-.25-.11-.25-.25z"/></svg>
          <span class="web-cart-badge" id="webCartBadge"></span>
        </button>
        <button class="web-icon-btn" onclick="showWebOrders()" title="Orders">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 9h5v2H6V9zm0 4h8v2H6v-2zm10 0h2v2h-2v-2zm-4-4h4v2h-4V9z"/></svg>
        </button>
        <button class="web-icon-btn" onclick="showWebBookings()" title="Bookings">
          <svg style="width:20px;height:20px"><use href="#icon-calendar"/></svg>
        </button>
        <button class="web-icon-btn" onclick="showWebChat()" title="Messages">
          <svg style="width:20px;height:20px"><use href="#icon-chat"/></svg>
        </button>
        <button class="web-icon-btn" onclick="showWebProfile()" title="Profile">
          <svg style="width:20px;height:20px"><use href="#icon-user"/></svg>
        </button>
        <button class="web-exit-btn" onclick="closeWebApp()">
          <svg style="width:16px;height:16px"><use href="#icon-arrow-left"/></svg> Exit
        </button>
      </div>
    </header>
    <div class="web-content" id="webContent"></div>
  </div>

  <script src="js/locales.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/web.js"></script>
</body>
</html>
