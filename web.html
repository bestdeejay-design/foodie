<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodie — Restaurant Finder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23e0523c' d='M8.1 13.34l2.83-2.83L3.91 3.5c-1.56 1.56-1.56 4.09 0 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z'/></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css">
  <style>
    :root { --sidebar-w: 260px; }

    body { overflow-x: hidden; }

    /* Header */
    .web-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-dark); border-bottom: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; gap: 20px;
    }
    .web-logo { font-size: 24px; font-weight:800; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .web-logo svg { width: 28px; height: 28px; }

    .web-search {
      flex: 1; max-width: 480px; display: flex; align-items: center; gap: 10px;
      background: var(--bg-card); border-radius: 12px; padding: 10px 16px;
    }
    .web-search svg { width: 20px; height: 20px; color: var(--text-muted); flex-shrink: 0; }
    .web-search input {
      background: none; border: none; color: var(--text); font-size: 15px; outline: none; width: 100%;
    }
    .web-search input::placeholder { color: var(--text-muted); }

    .web-header-actions { display: flex; align-items: center; gap: 8px; }

    /* Category bar */
    .web-categories {
      position: sticky; top: 63px; z-index: 99;
      background: var(--bg-dark); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; gap: 8px; overflow-x: auto;
    }
    .web-category-chip {
      flex-shrink: 0; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      background: var(--bg-card); color: var(--text-muted); border: none; cursor: pointer; white-space: nowrap;
      transition: all 0.2s;
    }
    .web-category-chip:hover { background: var(--bg-light); }
    .web-category-chip.active { background: var(--primary); color: #fff; }

    /* Main layout */
    .web-main { display: flex; min-height: calc(100vh - 120px); }
    .web-content { flex: 1; padding: 24px; max-width: 1200px; margin: 0 auto; }
    .web-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

    /* Card */
    .web-card {
      background: var(--bg-card); border-radius: 16px; overflow: hidden;
      cursor: pointer; transition: all 0.25s;
    }
    .web-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px var(--shadow); }
    .web-card-img {
      height: 180px; background-size: cover; background-position: center; position: relative;
    }
    .web-card-fav {
      position: absolute; top: 12px; right: 12px; width: 36px; height: 36px;
      border-radius: 50%; background: rgba(0,0,0,0.5); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 1;
    }
    .web-card-body { padding: 16px; }
    .web-card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .web-card-meta { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
    .web-card-meta .rating { display: flex; align-items: center; gap: 4px; color: var(--accent); font-weight: 700; }
    .web-card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .web-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
    .web-card-tag { font-size: 11px; padding: 3px 10px; background: var(--bg-light); border-radius: 10px; color: var(--text-muted); }

    /* Detail page */
    .web-detail-hero {
      height: 320px; background-size: cover; background-position: center; border-radius: 20px;
      position: relative; margin-bottom: 24px; display: flex; align-items: flex-end; padding: 24px;
    }
    .web-detail-hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:60%; background:linear-gradient(transparent, rgba(0,0,0,0.7)); border-radius: 0 0 20px 20px; z-index:1; }
    .web-detail-hero-info { position: relative; z-index: 2; color: #fff; }
    .web-detail-hero-info h1 { font-size: 36px; margin-bottom: 8px; }

    .web-detail-body { display: grid; grid-template-columns: 1fr 340px; gap: 32px; }
    .web-detail-main h3 { font-size: 18px; margin-bottom: 12px; }
    .web-detail-desc { font-size: 15px; line-height: 1.7; color: var(--text-muted); margin-bottom: 24px; }

    .web-menu-item {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .web-menu-item:last-child { border-bottom: none; }
    .web-menu-item h4 { margin: 0 0 4px; font-size: 15px; }
    .web-menu-item p { margin: 0; font-size: 13px; color: var(--text-muted); }
    .web-menu-item .price { font-weight: 700; color: var(--success); font-size: 16px; margin-left: 16px; white-space: nowrap; }

    .web-detail-sidebar { position: sticky; top: 130px; align-self: start; }
    .web-sidebar-card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .web-sidebar-card .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .web-sidebar-card .info-row:last-child { border-bottom: none; }
    .web-sidebar-card .info-label { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .web-sidebar-card .info-value { font-weight: 500; }

    .web-book-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 15px var(--glow); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .web-book-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--glow); }

    .web-back { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer; font-size: 14px; margin-bottom: 16px; border:none;background:none; }
    .web-back:hover { color: var(--primary); }

    .web-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }

    @media (max-width: 900px) {
      .web-header { padding: 10px 16px; }
      .web-search { max-width: none; }
      .web-detail-body { grid-template-columns: 1fr; }
      .web-detail-hero { height: 220px; }
      .web-detail-hero-info h1 { font-size: 28px; }
      .web-grid { grid-template-columns: 1fr; }
      .web-content { padding: 16px; }
    }
  </style>
</head>
<body>
  <svg style="display:none">
    <defs>
      <symbol id="icon-home" viewBox="0 0 24 24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
      <symbol id="icon-heart" viewBox="0 0 24 24"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></symbol>
      <symbol id="icon-search" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
      <symbol id="icon-star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></symbol>

      <symbol id="icon-phone" viewBox="0 0 24 24"><path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></symbol>

      <symbol id="icon-moon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.44-.44-.07-.9-.1-1.36-.1z"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
    </defs>
  </svg>

  <div id="app">
    <!-- Header -->
    <header class="web-header">
      <div class="web-logo" onclick="showHome()">
        <svg><use href="#icon-home"/></svg> Foodie
      </div>
      <div class="web-search">
        <svg><use href="#icon-search"/></svg>
        <input type="text" id="searchInput" placeholder="Search restaurants, cuisines..." oninput="handleSearch(this.value)">
      </div>
      <div class="web-header-actions">
        <button class="web-category-chip" style="font-size:12px;cursor:pointer" onclick="var l=window.CURRENT_LANG==='en'?'ru':'en';switchLang(l)" title="Switch language">
          Lang: EN/RU
        </button>
        <button class="web-category-chip" style="font-size:12px;width:36px;height:36px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">
          <svg style="width:18px;height:18px"><use href="#icon-sun"/></svg>
        </button>
      </div>
    </header>

    <!-- Category Bar -->
    <div class="web-categories" id="categoryBar"></div>

    <!-- Main Content -->
    <div class="web-main">
      <div class="web-content" id="mainContent"></div>
    </div>
  </div>

  <script src="js/locales.js"></script>
  <script src="js/data.js"></script>
  <script src="js/web.js"></script>
</body>
</html>
